kind = "web"
previewPath = "/"
title = "Job Search App"
version = "1.0.0"
id = "artifacts/job-search"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24134

[services.development]
run = "pnpm --filter @workspace/job-search run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/job-search", "run", "build" ]
publicDir = "artifacts/job-search/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24134"
BASE_PATH = "/"
